<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despacho Diario</title>
<meta name="theme-color" content="#2D6A4F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Despacho">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #F7F5F0;
    --surface: #FFF;
    --surface2: #F0EDE8;
    --ink: #1A1814;
    --ink2: #6B6760;
    --ink3: #A8A49F;
    --accent: #2D6A4F;
    --accent-light: #D8F3DC;
    --info: #1D4ED8;
    --warn: #92400E;
    --warn-light: #FEF3C7;
    --danger: #991B1B;
    --danger-light: #FEE2E2;
    --border: #E2DDD8;
    --radius: 12px;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 80px;
  }

  /* HEADER */
  .header {
    max-width: 900px;
    margin: 0 auto 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .header h1 { font-size: 20px; font-weight: 600; }
  .header-date { font-size: 14px; color: var(--ink2); font-family: 'DM Mono', monospace; }

  /* FORM PANEL */
  .form-panel {
    max-width: 900px;
    margin: 0 auto 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
  }
  .form-panel h2 {
    font-size: 14px;
    font-weight: 600;
    color: var(--ink2);
    margin-bottom: 16px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .form-grid .span2 { grid-column: span 2; }
  @media (max-width: 640px) {
    .form-grid { grid-template-columns: 1fr 1fr; }
    .form-grid .span2 { grid-column: span 2; }
  }

  .field label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--ink2);
    margin-bottom: 6px;
  }
  .field input, .field select {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    background: var(--bg);
    color: var(--ink);
    outline: none;
    transition: border-color 0.15s;
    appearance: none;
  }
  .field input:focus, .field select:focus { border-color: var(--accent); }
  .field-geo {
    position: relative;
  }
  .field-geo input { padding-right: 38px; }
  .geo-spinner {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    width: 16px;
    height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: none;
  }
  .geo-ok {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    display: none;
  }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
  .zone-preview {
    margin-top: 6px;
    font-size: 12px;
    color: var(--accent);
    font-weight: 500;
    min-height: 16px;
  }
  .zone-preview.error { color: var(--danger); }
  .zone-preview.warn { color: var(--warn); }

  /* AUTOCOMPLETE DROPDOWN */
  .autocomplete-wrapper { position: relative; }
  .autocomplete-list {
    position: absolute;
    top: calc(100% + 4px);
    left: 0; right: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.10);
    z-index: 100;
    overflow: hidden;
    display: none;
  }
  .autocomplete-list.open { display: block; }
  .autocomplete-item {
    padding: 10px 14px;
    cursor: pointer;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .autocomplete-item:last-child { border-bottom: none; }
  .autocomplete-item:hover, .autocomplete-item.active { background: var(--surface2); }
  .autocomplete-icon { font-size: 14px; flex-shrink: 0; margin-top: 1px; }
  .autocomplete-main { font-size: 13px; font-weight: 500; color: var(--ink); }
  .autocomplete-sub { font-size: 11px; color: var(--ink3); margin-top: 2px; }
  .autocomplete-zone {
    margin-left: auto;
    flex-shrink: 0;
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--accent-light);
    color: var(--accent);
    align-self: center;
  }
  .autocomplete-zone.unknown { background: var(--surface2); color: var(--ink3); }

  .form-actions {
    margin-top: 14px;
    display: flex;
    gap: 10px;
    align-items: center;
  }

  /* BUTTONS */
  .btn {
    padding: 10px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-ghost { background: var(--surface2); color: var(--ink); }
  .btn-danger { background: var(--danger-light); color: var(--danger); }
  .btn-sm { padding: 7px 13px; font-size: 13px; }

  /* SUMMARY CHIPS */
  .summary-row {
    max-width: 900px;
    margin: 0 auto 20px;
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .chip {
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 13px;
    font-weight: 500;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--ink2);
  }
  .chip strong { color: var(--ink); }

  /* ZONE SECTION */
  .zones {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .zone-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .zone-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .zone-badge {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .zone-badge.unknown { background: var(--ink3); }
  .zone-name { font-weight: 600; font-size: 15px; }
  .zone-count { margin-left: auto; font-size: 13px; color: var(--ink2); }

  /* ORDER TABLE */
  .order-table {
    width: 100%;
    border-collapse: collapse;
  }
  .order-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    color: var(--ink3);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 10px 18px;
    border-bottom: 1px solid var(--border);
  }
  .order-table td {
    padding: 12px 18px;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
  }
  .order-table tr:last-child td { border-bottom: none; }
  .order-table tr:hover td { background: var(--bg); }

  .order-num { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink3); }
  .order-name { font-weight: 500; }
  .order-addr { color: var(--ink2); font-size: 12px; margin-top: 2px; }
  .order-phone { color: var(--ink2); font-size: 13px; }
  .order-notes {
    font-size: 12px;
    color: var(--warn);
    background: var(--warn-light);
    padding: 3px 8px;
    border-radius: 4px;
    margin-top: 4px;
    display: inline-block;
  }
  .qty-badge {
    display: inline-block;
    background: var(--surface2);
    border-radius: 6px;
    padding: 3px 10px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 600;
  }
  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    color: var(--ink3);
    font-size: 16px;
    padding: 4px;
    border-radius: 4px;
    line-height: 1;
    transition: color 0.15s;
  }
  .delete-btn:hover { color: var(--danger); }

  /* EMPTY STATE */
  .empty-zone {
    padding: 20px 18px;
    color: var(--ink3);
    font-size: 13px;
    text-align: center;
  }
  .empty-all {
    max-width: 900px;
    margin: 0 auto;
    text-align: center;
    padding: 48px 24px;
    color: var(--ink3);
    font-size: 14px;
  }

  /* VIEW TOGGLE */
  .view-toggle {
    max-width: 900px;
    margin: 0 auto 20px;
    display: flex;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 4px;
    width: fit-content;
  }
  .toggle-btn {
    padding: 7px 16px;
    border-radius: 7px;
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--ink2);
    transition: all 0.15s;
  }
  .toggle-btn.active {
    background: var(--accent);
    color: #fff;
  }

  /* RUTA CARD */
  .ruta-card {
    max-width: 900px;
    margin: 0 auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .ruta-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 13px;
    color: var(--ink2);
  }
  .ruta-header strong { color: var(--ink); }
  .ruta-stop {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 12px 18px;
    border-bottom: 1px solid var(--border);
    position: relative;
  }
  .ruta-stop:last-child { border-bottom: none; }
  .ruta-stop:hover { background: var(--bg); }
  .ruta-num {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    margin-top: 1px;
  }
  .ruta-depot-dot {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: var(--ink);
    color: #fff;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .ruta-info { flex: 1; min-width: 0; }
  .ruta-name { font-weight: 500; font-size: 14px; }
  .ruta-addr { font-size: 12px; color: var(--ink2); margin-top: 2px; }
  .ruta-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .ruta-zone-chip {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 999px;
    background: var(--surface2);
    color: var(--ink2);
  }
  .ruta-notes {
    font-size: 11px;
    color: var(--warn);
    background: var(--warn-light);
    padding: 2px 7px;
    border-radius: 4px;
  }
  .ruta-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }
  .ruta-dist {
    font-size: 12px;
    color: var(--ink3);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
  }
  .ruta-arrow {
    position: absolute;
    left: 31px;
    bottom: -10px;
    width: 2px;
    height: 10px;
    background: var(--border);
    z-index: 1;
  }
  .ruta-stop:last-child .ruta-arrow { display: none; }
  .ruta-depot-row {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 12px 18px;
    background: var(--surface2);
    font-size: 13px;
    color: var(--ink2);
    border-top: 1px solid var(--border);
  }
  .btn-wsp {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 13px;
    border-radius: 8px;
    border: none;
    background: #25D366;
    color: #fff;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    white-space: nowrap;
    transition: opacity 0.15s;
  }
  .btn-wsp:hover { opacity: 0.85; }
  .btn-wsp svg { flex-shrink: 0; }

  /* PRINT BAR */
  .print-bar {
    max-width: 900px;
    margin: 24px auto 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 10px;
  }

  @media print {
    body { background: #fff; padding: 0; }
    .form-panel, .print-bar, .summary-row, .delete-btn, .view-toggle { display: none !important; }
    .zone-card, .ruta-card { break-inside: avoid; border: 1px solid #ccc; }
    .header { margin-bottom: 16px; }
  }
</style>
</head>
<body>

<div class="header">
  <h1>Despacho Diario</h1>
  <div style="text-align:right">
    <div class="header-date" id="headerDate"></div>
    <div style="font-size:12px;color:var(--ink3);margin-top:2px">Depósito: Av. Caseros 2431, CABA</div>
  </div>
</div>

<!-- FORM -->
<div class="form-panel">
  <h2>Agregar pedido</h2>
  <div class="form-grid">
    <div class="field span2">
      <label>Nombre del cliente</label>
      <input type="text" id="fNombre" placeholder="Juan García" autocomplete="off">
    </div>
    <div class="field">
      <label>Teléfono</label>
      <input type="tel" id="fTelefono" placeholder="11 1234-5678">
    </div>
    <div class="field span2">
      <label>Dirección completa</label>
      <div class="field-geo autocomplete-wrapper">
        <input type="text" id="fDireccion" placeholder="Av. Corrientes 1234, Palermo" autocomplete="off" oninput="onDireccionInput()" onkeydown="onDireccionKey(event)">
        <div class="geo-spinner" id="geoSpinner"></div>
        <div class="geo-ok" id="geoOk">✓</div>
        <div class="autocomplete-list" id="autocompleteList"></div>
      </div>
      <div class="zone-preview" id="zonePreview"></div>
    </div>
    <div class="field" style="display:none">
      <input type="hidden" id="fLocalidad">
    </div>
    <div class="field">
      <label>Bultos</label>
      <input type="number" id="fBultos" value="1" min="1" max="99">
    </div>
    <div class="field">
      <label>Observaciones</label>
      <input type="text" id="fNotas" placeholder="Opcional">
    </div>
  </div>
  <div class="form-actions">
    <button class="btn btn-primary" onclick="agregarPedido()">Agregar pedido</button>
    <button class="btn btn-ghost btn-sm" onclick="limpiarTodo()" id="btnLimpiar" style="display:none">Limpiar todo</button>
  </div>
</div>

<!-- SUMMARY -->
<div class="summary-row" id="summaryRow" style="display:none"></div>

<!-- VIEW TOGGLE -->
<div class="view-toggle" id="viewToggle" style="display:none">
  <button class="toggle-btn active" id="btnVistaPorZona" onclick="setVista('zonas')">Por zona</button>
  <button class="toggle-btn" id="btnVistaRuta" onclick="setVista('ruta')">Ruta optimizada</button>
</div>

<!-- ZONAS -->
<div id="zonesContainer"></div>

<!-- RUTA OPTIMIZADA -->
<div id="rutaContainer" style="display:none"></div>

<!-- PRINT BAR -->
<div class="print-bar" id="printBar" style="display:none">
  <span style="font-size:13px;color:var(--ink2)" id="printCount"></span>
  <button class="btn btn-ghost btn-sm" onclick="window.print()">Imprimir hoja de ruta</button>
</div>

<script>
// Depósito: Av. Caseros 2431, CABA
const DEPOT = { lat: -34.6288, lng: -58.4092 };

const ZONES = [
  {
    name: 'Sur',
    order: 1,
    localidades: ['parque patricios', 'barracas', 'boca', 'la boca', 'san telmo', 'liniers', 'mataderos', 'villa lugano', 'lomas de zamora', 'lanus', 'lanús', 'avellaneda', 'quilmes', 'berazategui', 'nueva pompeya', 'pompeya', 'villa soldati']
  },
  {
    name: 'Centro',
    order: 2,
    localidades: ['microcentro', 'retiro', 'san nicolas', 'san nicolás', 'monserrat', 'puerto madero', 'constitucion', 'constitución', 'once', 'balvanera', 'congreso']
  },
  {
    name: 'Oeste',
    order: 3,
    localidades: ['ituzaingo', 'ituzaingó', 'caseros', 'san martin', 'san martín', 'moron', 'morón', 'hurlingham', 'ramos mejia', 'ramos mejía', 'haedo', 'caballito', 'flores', 'floresta', 'villa del parque', 'devoto', 'villa devoto', 'villa real', 'monte castro']
  },
  {
    name: 'Norte',
    order: 4,
    localidades: ['palermo', 'recoleta', 'belgrano', 'nunez', 'núñez', 'colegiales', 'olivos', 'martinez', 'martínez', 'vicente lopez', 'vicente lópez', 'san isidro', 'acassuso', 'boulogne', 'villa urquiza', 'saavedra', 'villa pueyrredon', 'villa pueyrredón']
  }
];

let pedidos = JSON.parse(localStorage.getItem('despacho_pedidos') || '[]');
let nextId = parseInt(localStorage.getItem('despacho_nextId') || '1');
let geoTimer = null;
let currentGeoResult = null; // { zona, localidad, display }
let acActiveIndex = -1;
let vistaActual = 'zonas';

function save() {
  localStorage.setItem('despacho_pedidos', JSON.stringify(pedidos));
  localStorage.setItem('despacho_nextId', String(nextId));
}

function distKm(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1 * Math.PI/180) * Math.cos(lat2 * Math.PI/180) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function assignZoneByText(text = '') {
  const norm = text.toLowerCase().trim();
  for (const zone of ZONES) {
    if (zone.localidades.some(loc => norm.includes(loc) || loc.includes(norm))) {
      return zone;
    }
  }
  return null;
}

function extractLocalidad(addr = {}) {
  return addr.suburb || addr.neighbourhood || addr.district || addr.city_district || addr.town || addr.city || addr.county || '';
}

function closeAutocomplete() {
  document.getElementById('autocompleteList').classList.remove('open');
  acActiveIndex = -1;
}

function onDireccionInput() {
  clearTimeout(geoTimer);
  currentGeoResult = null;
  const val = document.getElementById('fDireccion').value.trim();
  const preview = document.getElementById('zonePreview');
  const spinner = document.getElementById('geoSpinner');
  const ok = document.getElementById('geoOk');

  spinner.style.display = 'none';
  ok.style.display = 'none';
  preview.textContent = '';
  preview.className = 'zone-preview';
  closeAutocomplete();

  if (val.length < 5) return;

  geoTimer = setTimeout(() => geocode(val), 600);
}

function onDireccionKey(e) {
  const list = document.getElementById('autocompleteList');
  const items = list.querySelectorAll('.autocomplete-item');
  if (!items.length) return;

  if (e.key === 'ArrowDown') {
    e.preventDefault();
    acActiveIndex = Math.min(acActiveIndex + 1, items.length - 1);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
  } else if (e.key === 'ArrowUp') {
    e.preventDefault();
    acActiveIndex = Math.max(acActiveIndex - 1, 0);
    items.forEach((el, i) => el.classList.toggle('active', i === acActiveIndex));
  } else if (e.key === 'Enter' && acActiveIndex >= 0) {
    e.preventDefault();
    e.stopPropagation();
    items[acActiveIndex].click();
  } else if (e.key === 'Escape') {
    closeAutocomplete();
  }
}

async function geocode(query) {
  const spinner = document.getElementById('geoSpinner');
  const preview = document.getElementById('zonePreview');
  const list = document.getElementById('autocompleteList');

  spinner.style.display = 'block';

  try {
    // Sin restricción a CABA — busca en toda Argentina con preferencia en Buenos Aires
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query + ', Argentina')}&format=json&addressdetails=1&limit=6&countrycodes=ar`;
    const res = await fetch(url, { headers: { 'Accept-Language': 'es' } });
    const results = await res.json();

    spinner.style.display = 'none';

    if (!results.length) {
      preview.textContent = 'No se encontró la dirección';
      preview.className = 'zone-preview warn';
      return;
    }

    // Armar dropdown
    list.innerHTML = '';
    results.forEach((data, idx) => {
      const addr = data.address || {};
      const localidad = extractLocalidad(addr);
      const zone = assignZoneByText(localidad) || assignZoneByText(data.display_name);

      // Línea principal: calle + número
      const street = [addr.road, addr.house_number].filter(Boolean).join(' ') || data.display_name.split(',')[0];
      // Línea secundaria: barrio, ciudad, provincia
      const parts = [localidad, addr.city || addr.town, addr.state].filter(Boolean);
      const sub = [...new Set(parts)].join(', ');

      const item = document.createElement('div');
      item.className = 'autocomplete-item';
      item.innerHTML = `
        <div class="autocomplete-icon">📍</div>
        <div style="flex:1;min-width:0">
          <div class="autocomplete-main">${street}</div>
          <div class="autocomplete-sub">${sub}</div>
        </div>
        ${zone
          ? `<div class="autocomplete-zone">${zone.name}</div>`
          : `<div class="autocomplete-zone unknown">Sin zona</div>`}
      `;
      item.addEventListener('click', () => selectResult(data, localidad, zone));
      list.appendChild(item);
    });

    list.classList.add('open');
  } catch {
    spinner.style.display = 'none';
    preview.textContent = 'Error al conectar — revisá tu conexión';
    preview.className = 'zone-preview error';
  }
}

function selectResult(data, localidad, zone) {
  const addr = data.address || {};
  const street = [addr.road, addr.house_number].filter(Boolean).join(' ') || data.display_name.split(',')[0];
  const city = addr.city || addr.town || localidad;
  const fullAddr = [street, localidad, city].filter(Boolean);
  const display = [...new Set(fullAddr)].join(', ');

  document.getElementById('fDireccion').value = display;
  closeAutocomplete();

  const preview = document.getElementById('zonePreview');
  const ok = document.getElementById('geoOk');
  const lat = parseFloat(data.lat);
  const lng = parseFloat(data.lon);
  const dist = distKm(DEPOT.lat, DEPOT.lng, lat, lng);

  if (zone) {
    currentGeoResult = { zona: zone.name, localidad, lat, lng };
    preview.textContent = `${localidad} → Zona ${zone.name} · ${dist.toFixed(1)} km del depósito`;
    preview.className = 'zone-preview';
  } else {
    currentGeoResult = { zona: 'Sin zona', localidad, lat, lng };
    preview.textContent = `${localidad || 'Dirección encontrada'} → Sin zona · ${dist.toFixed(1)} km del depósito`;
    preview.className = 'zone-preview warn';
  }
  ok.style.display = 'block';
}

function agregarPedido() {
  const nombre = document.getElementById('fNombre').value.trim();
  const telefono = document.getElementById('fTelefono').value.trim();
  const direccion = document.getElementById('fDireccion').value.trim();
  const bultos = parseInt(document.getElementById('fBultos').value) || 1;
  const notas = document.getElementById('fNotas').value.trim();

  if (!nombre) { document.getElementById('fNombre').focus(); return; }
  if (!direccion) { document.getElementById('fDireccion').focus(); return; }
  if (!currentGeoResult) {
    document.getElementById('zonePreview').textContent = 'Esperá a que se detecte la zona o corregí la dirección';
    document.getElementById('zonePreview').className = 'zone-preview warn';
    return;
  }

  pedidos.push({
    id: nextId++,
    nombre,
    telefono,
    direccion,
    localidad: currentGeoResult.localidad,
    bultos,
    notas,
    zona: currentGeoResult.zona,
    lat: currentGeoResult.lat,
    lng: currentGeoResult.lng
  });
  save();

  // reset form
  ['fNombre','fTelefono','fDireccion','fNotas'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('fBultos').value = '1';
  document.getElementById('zonePreview').textContent = '';
  document.getElementById('zonePreview').className = 'zone-preview';
  document.getElementById('geoOk').style.display = 'none';
  currentGeoResult = null;
  document.getElementById('fNombre').focus();

  render();
}

function wspUrl(telefono, nombre) {
  let num = (telefono || '').replace(/\D/g, '');
  if (!num) return null;
  if (num.startsWith('0')) num = num.slice(1);
  if (!num.startsWith('54')) num = '54' + num;
  if (num.startsWith('54') && !num.startsWith('549')) num = '549' + num.slice(2);
  const msg = encodeURIComponent(`Hola ${nombre}, te avisamos que estamos por llegar con tu pedido. ¡Nos vemos en unos minutos! 🚚`);
  return `https://wa.me/${num}?text=${msg}`;
}

// Nearest-neighbor TSP desde el depósito
function optimizarRuta(lista) {
  const sinCoords = lista.filter(p => !p.lat || !p.lng);
  const conCoords = lista.filter(p => p.lat && p.lng);

  const visitados = new Array(conCoords.length).fill(false);
  const ruta = [];
  let curLat = DEPOT.lat;
  let curLng = DEPOT.lng;

  for (let i = 0; i < conCoords.length; i++) {
    let minDist = Infinity;
    let minIdx = -1;
    for (let j = 0; j < conCoords.length; j++) {
      if (visitados[j]) continue;
      const d = distKm(curLat, curLng, conCoords[j].lat, conCoords[j].lng);
      if (d < minDist) { minDist = d; minIdx = j; }
    }
    visitados[minIdx] = true;
    ruta.push({ pedido: conCoords[minIdx], distDesdeAnterior: minDist });
    curLat = conCoords[minIdx].lat;
    curLng = conCoords[minIdx].lng;
  }

  // Distancia de vuelta al depósito
  const distVuelta = ruta.length
    ? distKm(curLat, curLng, DEPOT.lat, DEPOT.lng)
    : 0;

  // Pedidos sin coords van al final
  sinCoords.forEach(p => ruta.push({ pedido: p, distDesdeAnterior: null }));

  const totalKm = ruta.reduce((s, r) => s + (r.distDesdeAnterior || 0), 0) + distVuelta;
  return { ruta, totalKm, distVuelta };
}

function setVista(vista) {
  vistaActual = vista;
  document.getElementById('btnVistaPorZona').classList.toggle('active', vista === 'zonas');
  document.getElementById('btnVistaRuta').classList.toggle('active', vista === 'ruta');
  document.getElementById('zonesContainer').style.display = vista === 'zonas' ? '' : 'none';
  document.getElementById('rutaContainer').style.display = vista === 'ruta' ? '' : 'none';
}

function renderRuta(lista) {
  const container = document.getElementById('rutaContainer');
  const { ruta, totalKm, distVuelta } = optimizarRuta(lista);

  const sinGeo = ruta.filter(r => !r.pedido.lat).length;
  const advertencia = sinGeo
    ? `<div style="padding:10px 18px;font-size:12px;color:var(--warn);background:var(--warn-light);border-bottom:1px solid var(--border)">${sinGeo} pedido${sinGeo > 1 ? 's' : ''} sin coordenadas — se agregaron al final sin optimizar</div>`
    : '';

  const wspIcon = `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.122 1.532 5.848L0 24l6.335-1.54A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.818a9.818 9.818 0 01-5.006-1.374l-.36-.214-3.724.905.944-3.617-.235-.372A9.818 9.818 0 012.182 12C2.182 6.57 6.57 2.182 12 2.182S21.818 6.57 21.818 12 17.43 21.818 12 21.818z"/></svg>`;

  const stops = ruta.map((r, idx) => {
    const p = r.pedido;
    const dist = r.distDesdeAnterior !== null ? r.distDesdeAnterior.toFixed(1) + ' km' : '—';
    const isLast = idx === ruta.length - 1;
    const wsp = wspUrl(p.telefono, p.nombre);
    return `
      <div class="ruta-stop">
        <div class="ruta-num">${idx + 1}</div>
        <div class="ruta-info">
          <div class="ruta-name">${p.nombre}</div>
          <div class="ruta-addr">${[p.direccion, p.localidad].filter(Boolean).join(' — ')}</div>
          <div class="ruta-meta">
            <span class="ruta-zone-chip">${p.zona}</span>
            ${p.notas ? `<span class="ruta-notes">${p.notas}</span>` : ''}
          </div>
          <div style="margin-top:8px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
            ${wsp
              ? `<a class="btn-wsp" href="${wsp}" target="_blank" rel="noopener">${wspIcon} Avisar llegada</a>
                 <span style="font-size:12px;color:var(--ink3)">${p.telefono}</span>`
              : `<span style="font-size:12px;color:var(--ink3)">Sin teléfono</span>`
            }
          </div>
        </div>
        <div class="ruta-right">
          <span class="qty-badge">${p.bultos} bulto${p.bultos !== 1 ? 's' : ''}</span>
          <span class="ruta-dist">${dist}</span>
        </div>
        ${!isLast ? '<div class="ruta-arrow"></div>' : ''}
      </div>
    `;
  }).join('');

  container.innerHTML = `
    <div class="ruta-card">
      <div class="ruta-header">
        <span>Ruta optimizada · <strong>${ruta.length} paradas</strong></span>
        <span>Total estimado: <strong>${totalKm.toFixed(1)} km</strong> (ida + vuelta)</span>
      </div>
      <div class="ruta-stop">
        <div class="ruta-depot-dot">🏭</div>
        <div class="ruta-info">
          <div class="ruta-name">Depósito — Av. Caseros 2431</div>
          <div class="ruta-addr">Parque Patricios, CABA · Punto de partida</div>
        </div>
        <div class="ruta-arrow"></div>
      </div>
      ${advertencia}
      ${stops}
      <div class="ruta-depot-row">
        <div class="ruta-depot-dot">🏭</div>
        <span>Regreso al depósito · <strong>${distVuelta.toFixed(1)} km</strong></span>
      </div>
    </div>
  `;
}

function eliminarPedido(id) {
  pedidos = pedidos.filter(p => p.id !== id);
  save();
  render();
}

function limpiarTodo() {
  if (!confirm('¿Borrar todos los pedidos del día?')) return;
  pedidos = [];
  save();
  render();
}

function render() {
  const container = document.getElementById('zonesContainer');
  const summaryEl = document.getElementById('summaryRow');
  const printBar = document.getElementById('printBar');
  const btnLimpiar = document.getElementById('btnLimpiar');

  if (pedidos.length === 0) {
    container.innerHTML = '<div class="empty-all">Todavía no hay pedidos. Agregá el primero arriba.</div>';
    document.getElementById('rutaContainer').innerHTML = '';
    summaryEl.style.display = 'none';
    printBar.style.display = 'none';
    btnLimpiar.style.display = 'none';
    document.getElementById('viewToggle').style.display = 'none';
    return;
  }

  // Agrupar por zona y ordenar por distancia al depósito
  const grouped = {};
  for (const z of ZONES) grouped[z.name] = [];
  grouped['Sin zona'] = [];
  for (const p of pedidos) {
    const key = ZONES.find(z => z.name === p.zona) ? p.zona : 'Sin zona';
    grouped[key].push(p);
  }
  for (const key of Object.keys(grouped)) {
    grouped[key].sort((a, b) => {
      const dA = (a.lat && a.lng) ? distKm(DEPOT.lat, DEPOT.lng, a.lat, a.lng) : 999;
      const dB = (b.lat && b.lng) ? distKm(DEPOT.lat, DEPOT.lng, b.lat, b.lng) : 999;
      return dA - dB;
    });
  }

  // Summary
  const totalBultos = pedidos.reduce((s, p) => s + p.bultos, 0);
  summaryEl.innerHTML = `
    <div class="chip"><strong>${pedidos.length}</strong> pedido${pedidos.length !== 1 ? 's' : ''}</div>
    <div class="chip"><strong>${totalBultos}</strong> bulto${totalBultos !== 1 ? 's' : ''}</div>
    ${ZONES.map(z => grouped[z.name].length ? `<div class="chip">${z.name}: <strong>${grouped[z.name].length}</strong></div>` : '').join('')}
    ${grouped['Sin zona'].length ? `<div class="chip" style="border-color:#FECACA;color:#991B1B">Sin zona: <strong>${grouped['Sin zona'].length}</strong></div>` : ''}
  `;
  summaryEl.style.display = 'flex';

  // Render zonas
  container.innerHTML = '';
  const allZones = [...ZONES, ...(grouped['Sin zona'].length ? [{ name: 'Sin zona', order: 99 }] : [])];

  for (const zone of allZones) {
    const lista = grouped[zone.name] || [];
    const card = document.createElement('div');
    card.className = 'zone-card';

    const rows = lista.map((p, idx) => {
      const dist = (p.lat && p.lng) ? distKm(DEPOT.lat, DEPOT.lng, p.lat, p.lng).toFixed(1) + ' km' : '—';
      return `
        <tr>
          <td class="order-num">${idx + 1}</td>
          <td>
            <div class="order-name">${p.nombre}</div>
            <div class="order-addr">${[p.direccion, p.localidad].filter(Boolean).join(' — ')}</div>
            ${p.notas ? `<span class="order-notes">${p.notas}</span>` : ''}
          </td>
          <td class="order-phone">${p.telefono || '—'}</td>
          <td><span class="qty-badge">${p.bultos}</span></td>
          <td style="font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace;white-space:nowrap">${dist}</td>
          <td><button class="delete-btn" onclick="eliminarPedido(${p.id})" title="Eliminar">×</button></td>
        </tr>
      `;
    }).join('');

    card.innerHTML = `
      <div class="zone-header">
        <div class="zone-badge ${zone.order === 99 ? 'unknown' : ''}">${zone.order === 99 ? '?' : zone.order}</div>
        <div class="zone-name">${zone.name}</div>
        <div class="zone-count">${lista.length} pedido${lista.length !== 1 ? 's' : ''}</div>
      </div>
      ${lista.length ? `
        <table class="order-table">
          <thead><tr><th>#</th><th>Pedido</th><th>Teléfono</th><th>Bultos</th><th>Dist.</th><th></th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      ` : '<div class="empty-zone">Sin pedidos para esta zona</div>'}
    `;
    container.appendChild(card);
  }

  document.getElementById('printCount').textContent = `${pedidos.length} pedidos · ${totalBultos} bultos`;
  printBar.style.display = 'flex';
  btnLimpiar.style.display = 'inline-flex';
  document.getElementById('viewToggle').style.display = 'flex';

  renderRuta(pedidos);
  setVista(vistaActual);
}

// Enter para agregar
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && ['fNombre','fTelefono','fDireccion','fBultos','fNotas'].includes(e.target.id)) {
    agregarPedido();
  }
});

document.getElementById('headerDate').textContent = new Date().toLocaleDateString('es-AR', {
  weekday: 'long', day: 'numeric', month: 'long', year: 'numeric'
});

document.addEventListener('click', e => {
  if (!e.target.closest('.autocomplete-wrapper')) closeAutocomplete();
});

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

render();
</script>
