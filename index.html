<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Despacho Diario</title>
<meta name="theme-color" content="#2D6A4F">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Despacho">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon.svg">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #F7F5F0;
  --surface: #FFF;
  --surface2: #F0EDE8;
  --ink: #1A1814;
  --ink2: #6B6760;
  --ink3: #A8A49F;
  --accent: #2D6A4F;
  --accent-light: #D8F3DC;
  --info: #1D4ED8;
  --warn: #92400E;
  --warn-light: #FEF3C7;
  --danger: #991B1B;
  --danger-light: #FEE2E2;
  --border: #E2DDD8;
  --radius: 12px;
  --tab-h: 52px;
  --header-h: 56px;
}

html, body { height: 100%; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ── HEADER ── */
.app-header {
  background: var(--accent);
  color: #fff;
  padding: 0 18px;
  height: var(--header-h);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 20;
}
.app-header h1 { font-size: 17px; font-weight: 600; }
.app-header-date { font-size: 12px; opacity: 0.75; }

/* ── TABS ── */
.tabs {
  display: flex;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: var(--header-h);
  z-index: 19;
}
.tab-btn {
  flex: 1;
  height: var(--tab-h);
  border: none;
  background: transparent;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--ink3);
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: all 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 7px;
}
.tab-btn.active {
  color: var(--accent);
  border-bottom-color: var(--accent);
}
.tab-badge {
  background: var(--accent);
  color: #fff;
  font-size: 11px;
  font-weight: 700;
  border-radius: 999px;
  padding: 1px 7px;
  min-width: 20px;
  text-align: center;
}
.tab-badge.empty { background: var(--ink3); }

/* ── PANELS ── */
.panel { display: none; flex: 1; overflow-y: auto; padding: 20px 16px 60px; }
.panel.active { display: block; }
.inner { max-width: 860px; margin: 0 auto; }

/* ── FORM ── */
.form-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px;
  margin-bottom: 20px;
}
.form-card h2 {
  font-size: 13px;
  font-weight: 600;
  color: var(--ink2);
  text-transform: uppercase;
  letter-spacing: .05em;
  margin-bottom: 14px;
}
.form-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 11px;
}
.span2 { grid-column: span 2; }
@media (max-width: 520px) {
  .form-grid { grid-template-columns: 1fr; }
  .span2 { grid-column: span 1; }
}
.field label {
  display: block;
  font-size: 12px;
  font-weight: 500;
  color: var(--ink2);
  margin-bottom: 5px;
}
.field input {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  background: var(--bg);
  color: var(--ink);
  outline: none;
  transition: border-color .15s;
}
.field input:focus { border-color: var(--accent); }

/* geo */
.field-geo { position: relative; }
.field-geo input { padding-right: 36px; }
.geo-spinner {
  position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
  width: 15px; height: 15px;
  border: 2px solid var(--border); border-top-color: var(--accent);
  border-radius: 50%; animation: spin .7s linear infinite; display: none;
}
.geo-ok { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); font-size: 14px; display: none; }
@keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }
.zone-preview { margin-top: 5px; font-size: 12px; font-weight: 500; color: var(--accent); min-height: 15px; }
.zone-preview.warn { color: var(--warn); }
.zone-preview.error { color: var(--danger); }

/* autocomplete */
.autocomplete-wrapper { position: relative; }
.autocomplete-list {
  position: absolute; top: calc(100% + 4px); left: 0; right: 0;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; box-shadow: 0 8px 24px rgba(0,0,0,.10);
  z-index: 100; overflow: hidden; display: none;
}
.autocomplete-list.open { display: block; }
.autocomplete-item {
  padding: 10px 13px; cursor: pointer;
  border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; gap: 9px;
}
.autocomplete-item:last-child { border-bottom: none; }
.autocomplete-item:hover, .autocomplete-item.ac-active { background: var(--surface2); }
.ac-main { font-size: 13px; font-weight: 500; color: var(--ink); }
.ac-sub { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.ac-zone {
  margin-left: auto; flex-shrink: 0;
  font-size: 11px; font-weight: 600; padding: 2px 8px;
  border-radius: 999px; background: var(--accent-light); color: var(--accent);
  align-self: center;
}
.ac-zone.unknown { background: var(--surface2); color: var(--ink3); }

.form-actions { margin-top: 13px; display: flex; gap: 9px; }

/* ── BUTTONS ── */
.btn {
  padding: 10px 18px; border-radius: 8px; border: none;
  font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity .15s;
}
.btn:hover { opacity: .85; }
.btn-primary { background: var(--accent); color: #fff; }
.btn-ghost { background: var(--surface2); color: var(--ink); }
.btn-sm { padding: 7px 13px; font-size: 13px; }
.btn-wsp {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 9px 16px; border-radius: 8px; border: none;
  background: #25D366; color: #fff;
  font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 600;
  cursor: pointer; text-decoration: none; transition: opacity .15s;
}
.btn-wsp:hover { opacity: .85; }
.btn-done {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 9px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--ink2); font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500; cursor: pointer; transition: all .15s;
}
.btn-done.done { background: var(--accent-light); color: var(--accent); border-color: var(--accent-light); }

/* ── SUMMARY CHIPS ── */
.chips { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 18px; }
.chip {
  padding: 5px 13px; border-radius: 999px; font-size: 13px; font-weight: 500;
  background: var(--surface); border: 1px solid var(--border); color: var(--ink2);
}
.chip strong { color: var(--ink); }

/* ── ZONE CARD (pedidos tab) ── */
.zone-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 16px;
}
.zone-header {
  display: flex; align-items: center; gap: 11px;
  padding: 13px 16px; background: var(--surface2);
  border-bottom: 1px solid var(--border);
}
.zone-num {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--accent); color: #fff;
  font-size: 12px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.zone-num.unknown { background: var(--ink3); }
.zone-name { font-weight: 600; font-size: 15px; }
.zone-count { margin-left: auto; font-size: 13px; color: var(--ink2); }

.order-table { width: 100%; border-collapse: collapse; }
.order-table th {
  text-align: left; font-size: 11px; font-weight: 600;
  color: var(--ink3); text-transform: uppercase; letter-spacing: .06em;
  padding: 9px 16px; border-bottom: 1px solid var(--border);
}
.order-table td {
  padding: 11px 16px; font-size: 13px;
  border-bottom: 1px solid var(--border); vertical-align: top;
}
.order-table tr:last-child td { border-bottom: none; }
.order-table tr:hover td { background: var(--bg); }
.order-num-cell { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--ink3); }
.order-name { font-weight: 500; }
.order-addr { color: var(--ink2); font-size: 12px; margin-top: 2px; }
.td-orden { font-size:11px; font-family:'DM Mono',monospace; color:var(--info); margin-bottom:2px; }
.order-notes {
  display: inline-block; margin-top: 4px; font-size: 11px;
  color: var(--warn); background: var(--warn-light);
  padding: 2px 7px; border-radius: 4px;
}
.qty-badge {
  display: inline-block; background: var(--surface2); border-radius: 6px;
  padding: 3px 10px; font-family: 'DM Mono', monospace; font-size: 13px; font-weight: 600;
}
.del-btn {
  background: none; border: none; cursor: pointer;
  color: var(--ink3); font-size: 16px; padding: 3px; border-radius: 4px;
  transition: color .15s; line-height: 1;
}
.del-btn:hover { color: var(--danger); }
.empty-zone { padding: 18px; color: var(--ink3); font-size: 13px; text-align: center; }
.empty-all { text-align: center; padding: 52px 20px; color: var(--ink3); font-size: 14px; }

/* ── RUTA TAB ── */
.ruta-progress {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px;
  display: flex; align-items: center; gap: 14px;
}
.prog-bar-wrap { flex: 1; }
.prog-label { font-size: 13px; color: var(--ink2); margin-bottom: 6px; }
.prog-bar {
  height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden;
}
.prog-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .3s; }
.prog-pct { font-size: 20px; font-weight: 600; color: var(--accent); flex-shrink: 0; }

.depot-row {
  display: flex; align-items: center; gap: 12px;
  padding: 12px 16px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); margin-bottom: 4px;
}
.depot-dot {
  width: 34px; height: 34px; border-radius: 50%; background: var(--ink);
  color: #fff; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.depot-label { font-size: 13px; }
.depot-label strong { display: block; font-weight: 600; }
.depot-label span { color: var(--ink2); font-size: 12px; }

.connector { width: 2px; height: 12px; background: var(--border); margin-left: 33px; }

.stop-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 14px 16px; margin-bottom: 4px;
  transition: opacity .2s;
}
.stop-card.done { opacity: .45; }
.stop-top { display: flex; gap: 12px; align-items: flex-start; }
.stop-num {
  width: 34px; height: 34px; border-radius: 50%; background: var(--accent);
  color: #fff; font-size: 14px; font-weight: 700;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.stop-num.done-num { background: var(--ink3); }
.stop-info { flex: 1; min-width: 0; }
.stop-name { font-weight: 600; font-size: 15px; }
.stop-addr { font-size: 13px; color: var(--ink2); margin-top: 2px; line-height: 1.4; }
.stop-notes {
  display: inline-block; margin-top: 5px; font-size: 12px;
  color: var(--warn); background: var(--warn-light); padding: 2px 8px; border-radius: 4px;
}
.stop-right { flex-shrink: 0; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
.stop-dist { font-size: 11px; color: var(--ink3); font-family: 'DM Mono', monospace; }
.stop-actions { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }

@media (max-width: 640px) {
  /* Header */
  .app-header { padding: 0 12px; }
  .app-header h1 { font-size: 15px; }

  /* Panel */
  .panel { padding: 12px 10px 80px; }

  /* Form */
  .form-card { padding: 14px; }
  .form-grid { grid-template-columns: 1fr; }
  .span2 { grid-column: span 1; }
  .form-actions { flex-direction: column; }
  .form-actions .btn { width: 100%; text-align: center; }

  /* Chips */
  .chips { gap: 6px; }
  .chip { font-size: 12px; padding: 4px 10px; }

  /* Tabla → cards por fila */
  .zone-card { overflow: visible; }
  .order-table { min-width: unset !important; width: 100%; }
  .order-table thead { display: none; }
  .order-table tbody tr {
    display: grid;
    grid-template-columns: 1fr auto;
    grid-template-rows: auto auto auto;
    column-gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .order-table tbody tr:last-child { border-bottom: none; }
  .order-table tbody tr:hover td { background: none; }
  .order-table td { padding: 0; border: none; font-size: 13px; }

  /* Col izquierda: pedido ocupa filas 1-2, tel fila 3 */
  .td-num    { display: none; }
  .td-dist   { display: none; }
  .td-pedido { grid-column: 1; grid-row: 1; }
  .td-tel    { grid-column: 1; grid-row: 2; padding-top: 3px; font-size: 12px !important; }
  .td-horario{ grid-column: 1; grid-row: 3; padding-top: 2px; }
  .td-notas  { grid-column: 1; grid-row: 4; padding-top: 2px; font-size: 12px !important; }

  /* Col derecha: bultos arriba, delete abajo */
  .td-bultos { grid-column: 2; grid-row: 1; text-align: right; }
  .td-del    { grid-column: 2; grid-row: 2; text-align: right; align-self: end; }

  /* Stop cards */
  .stop-card { padding: 12px; }
  .stop-name { font-size: 14px; }
  .stop-actions { gap: 6px; }
  .stop-actions .btn-wsp,
  .stop-actions .btn-done,
  .stop-actions .btn { font-size: 12px; padding: 8px 10px; }

  /* Modal */
  .modal-overlay { align-items: flex-end; padding: 0; }
  .modal-box { border-radius: 16px 16px 0 0; padding: 20px 16px; max-width: 100%; max-height: 90vh; overflow-y: auto; }
  .modal-actions { flex-direction: column-reverse; }
  .modal-actions .btn { width: 100%; text-align: center; }

  /* Tabs */
  .tab-btn { font-size: 13px; padding: 0 8px; }
}

@media print {
  @page { size: A4; margin: 2cm; }

  * { -webkit-print-color-adjust: exact; print-color-adjust: exact; }

  /* Ocultar todo lo que no es hoja de ruta */
  .app-header, .tabs, .form-card, .chips,
  .stop-actions, .del-btn,
  #panelPedidos, #zonasPedidos, #chipsPedidos, #panelEntregados, #panelProgramada,
  .ruta-progress, .depot-row, .connector,
  a[href*="google.com"], button { display: none !important; }

  /* Mostrar solo el panel de ruta */
  body { background: #fff; font-family: 'DM Sans', sans-serif; }
  .panel { display: block !important; padding: 0 !important; overflow: visible !important; }
  .inner { max-width: 100% !important; }

  /* Título de impresión */
  #rutaInner::before {
    content: "Hoja de Ruta — " attr(data-fecha);
    display: block;
    font-size: 18px;
    font-weight: 700;
    margin-bottom: 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid #000;
  }

  /* Cards de paradas */
  .stop-card {
    display: block !important;
    border: 1px solid #ccc !important;
    border-radius: 6px !important;
    padding: 10px 14px !important;
    margin-bottom: 8px !important;
    page-break-inside: avoid;
    opacity: 1 !important;
  }
  .stop-top { display: flex !important; gap: 10px !important; align-items: flex-start !important; }
  .stop-num {
    width: 28px !important; height: 28px !important;
    font-size: 13px !important;
    background: #2D6A4F !important;
    flex-shrink: 0 !important;
  }
  .stop-num.done-num { background: #999 !important; }
  .stop-name { font-size: 14px !important; font-weight: 700 !important; }
  .stop-addr { font-size: 12px !important; color: #444 !important; }
  .stop-notes { font-size: 11px !important; }
  .stop-right { display: flex !important; flex-direction: column !important; align-items: flex-end !important; }
  .qty-badge { background: #eee !important; font-size: 12px !important; }
  .stop-dist { font-size: 11px !important; color: #666 !important; }

  /* Datos extra visibles en impresión */
  .print-tel, .print-horario, .print-orden { display: block !important; }
}

/* EDIT MODAL */
.modal-overlay {
  display:none; position:fixed; inset:0; z-index:9999;
  background:rgba(0,0,0,.45); align-items:center; justify-content:center; padding:20px;
}
.modal-overlay.open { display:flex; }
.modal-box {
  background:#fff; border-radius:var(--radius); padding:24px;
  width:100%; max-width:400px; box-shadow:0 8px 32px rgba(0,0,0,.15);
}
.modal-box h3 { font-size:15px; font-weight:600; margin-bottom:16px; }
.modal-field { margin-bottom:12px; }
.modal-field label { display:block; font-size:12px; font-weight:500; color:var(--ink2); margin-bottom:4px; }
.modal-field input { width:100%; padding:9px 12px; border:1px solid var(--border); border-radius:8px; font:14px 'DM Sans',sans-serif; background:var(--bg); box-sizing:border-box; }
.modal-field input:focus { outline:none; border-color:var(--accent); }
.modal-actions { display:flex; gap:8px; margin-top:16px; justify-content:flex-end; }

/* LOGIN */
#loginGate form { padding: 24px; }
</style>
</head>
<body>

<!-- MODAL EDITAR PEDIDO -->
<div class="modal-overlay" id="editModal">
  <div class="modal-box">
    <h3>Editar pedido</h3>
    <div class="modal-field"><label>Nº de orden</label><input id="editOrden" type="text"></div>
    <div class="modal-field"><label>Nombre</label><input id="editNombre" type="text"></div>
    <div class="modal-field"><label>Teléfono</label><input id="editTelefono" type="tel"></div>
    <div class="modal-field"><label>Dirección</label><input id="editDireccion" type="text"></div>
    <div class="modal-field"><label>Horario desde</label><input id="editHoraDesde" type="number" min="0" max="23" placeholder="ej: 9"></div>
    <div class="modal-field"><label>Horario hasta</label><input id="editHoraHasta" type="number" min="0" max="23" placeholder="ej: 14"></div>
    <div class="modal-field"><label>Observaciones</label><input id="editNotas" type="text"></div>
    <div class="modal-field"><label>Fecha de entrega</label><input id="editFechaEntrega" type="date"></div>
    <div class="modal-field"><label>Bultos</label><input id="editBultos" type="number" min="1" max="99"></div>
    <div class="modal-actions">
      <button class="btn btn-ghost btn-sm" onclick="cerrarEditModal()">Cancelar</button>
      <button class="btn btn-primary btn-sm" onclick="guardarEdicion()">Guardar</button>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="app-header">
  <div>
    <h1>Despacho Diario</h1>
    <div class="app-header-date" id="headerDate"></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <div style="font-size:12px;opacity:.7;text-align:right">Caseros 2431 · Parque Patricios</div>
    <span id="syncChip" style="display:none;font-size:11px;padding:1px 8px;border-radius:999px;background:rgba(255,255,255,.2);color:#fff"></span>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <button class="tab-btn active" id="tabBtnPedidos" onclick="setTab('pedidos')">
    📦 Pedidos <span class="tab-badge empty" id="badgePedidos">0</span>
  </button>
  <button class="tab-btn" id="tabBtnRuta" onclick="setTab('ruta')">
    🗺 Hoja de ruta <span class="tab-badge empty" id="badgeRuta">0</span>
  </button>
  <button class="tab-btn" id="tabBtnEntregados" onclick="setTab('entregados')">
    ✅ Entregados <span class="tab-badge empty" id="badgeEntregados">0</span>
  </button>
  <button class="tab-btn" id="tabBtnProgramada" onclick="setTab('programada')">
    📅 Programada <span class="tab-badge empty" id="badgeProgramada">0</span>
  </button>
</div>

<!-- PANEL: PEDIDOS -->
<div class="panel active" id="panelPedidos">
  <div class="inner">
    <div id="chipsPedidos" class="chips" style="display:none"></div>
    <div class="form-card">
      <h2>Agregar pedido</h2>
      <div class="form-grid">
        <div class="field">
          <label>Nº de orden (TiendaNube)</label>
          <input type="text" id="fOrden" placeholder="#12345" autocomplete="off">
        </div>
        <div class="field">
          <label>Nombre del cliente</label>
          <input type="text" id="fNombre" placeholder="Juan García" autocomplete="off">
        </div>
        <div class="field">
          <label>Teléfono</label>
          <input type="tel" id="fTelefono" placeholder="11 1234-5678">
        </div>
        <div class="field span2">
          <label>Dirección completa</label>
          <div class="field-geo autocomplete-wrapper">

<script>
/* ── CONSTANTES ── */
const DEPOT = { lat: -34.6288, lng: -58.4092 };

const ZONES = [
  { name:'Sur',    order:1, localidades:['parque patricios','barracas','boca','la boca','san telmo','liniers','mataderos','villa lugano','lomas de zamora','lanus','lanús','avellaneda','quilmes','berazategui','nueva pompeya','pompeya','villa soldati'] },

  { name:'Norte',  order:4, localidades:['palermo','recoleta','belgrano','nunez','núñez','colegiales','olivos','martinez','martínez','vicente lopez','vicente lópez','san isidro','acassuso','boulogne','villa urquiza','saavedra','villa pueyrredon','villa pueyrredón'] }
];

/* ── ESTADO ── */
let pedidos    = [];
let nextId     = 1;
let entregados = JSON.parse(sessionStorage.getItem('despacho_entregados') || '[]');

/* ── PERSIST ── */
function save() {
  _syncChip('syncing');
  _db.collection('despacho').doc('estado').set({ pedidos, nextId })
    .then(() => _syncChip('ok')).catch(() => _syncChip('error'));
}
function saveEntregados() {
  sessionStorage.setItem('despacho_entregados', JSON.stringify(entregados));
}

/* ── UTIL ── */
function distKm(la1,lo1,la2,lo2) {
  const R=6371, dL=(la2-la1)*Math.PI/180, dO=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dL/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dO/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function assignZone(text='') {
  const n=text.toLowerCase().trim();
  for(const z of ZONES) if(z.localidades.some(l=>n.includes(l)||l.includes(n))) return z;
  return null;
}

function extractLocalidad(addr={}) {
  return addr.suburb||addr.neighbourhood||addr.district||addr.city_district||addr.town||addr.city||addr.county||'';
}

function fmtHora(h) { return (h!==''&&h!=null) ? String(parseInt(String(h).split(':')[0])) : ''; }
function fmtRango(desde, hasta) {
  const d=fmtHora(desde), h=fmtHora(hasta);
  if(d&&h) return `${d}–${h}hs`;
  if(d) return `desde ${d}hs`;
  if(h) return `hasta ${h}hs`;
  return '';
}

function _fmtTel(tel) {
  let n=(tel||'').replace(/\D/g,'');
  if(!n) return null;
  if(n.startsWith('0')) n=n.slice(1);
  if(!n.startsWith('54')) n='54'+n;
  if(n.startsWith('54')&&!n.startsWith('549')) n='549'+n.slice(2);
  return n;
}
function wspUrl(tel,nombre) {
  const n=_fmtTel(tel);
  if(!n) return null;
  const msg=encodeURIComponent(`Hola ${nombre}, te avisamos que estamos por llegar con tu pedido. ¡Nos vemos en unos minutos! 🚚`);
  return `https://wa.me/${n}?text=${msg}`;
}
function wspUbicacion(tel, nombre) {
  if(!navigator.geolocation){ alert('Tu dispositivo no soporta GPS.'); return; }
  navigator.geolocation.getCurrentPosition(pos => {
    const n=_fmtTel(tel);
    if(!n){ alert('El pedido no tiene teléfono.'); return; }
    const {latitude:lat, longitude:lng} = pos.coords;
    const maps=`https://maps.google.com/?q=${lat},${lng}`;
    const msg=encodeURIComponent(`Hola ${nombre}, estamos en camino hacia vos. Acá podés ver dónde estamos ahora: ${maps} 🚚`);
    window.open(`https://wa.me/${n}?text=${msg}`, '_blank');
  }, () => alert('No se pudo obtener la ubicación. Verificá que el GPS esté activo.'));
}

function _nnRuta(lista, startLat, startLng) {
  const con=lista.filter(p=>p.lat&&p.lng), sin=lista.filter(p=>!p.lat||!p.lng);
  const vis=new Array(con.length).fill(false);
  const ruta=[];
  let cLat=startLat, cLng=startLng;
  for(let i=0;i<con.length;i++){
    let mn=Infinity,mi=-1;
    for(let j=0;j<con.length;j++){
      if(vis[j]) continue;
      const d=distKm(cLat,cLng,con[j].lat,con[j].lng);
      if(d<mn){mn=d;mi=j;}
    }
    vis[mi]=true;
    ruta.push({pedido:con[mi],dist:mn});
    cLat=con[mi].lat; cLng=con[mi].lng;
  }
  sin.forEach(p=>ruta.push({pedido:p,dist:null}));
  return {ruta, lastLat:cLat, lastLng:cLng};
}

function optimizarRuta(lista) {
  // Agrupar por franja horaria (horaDesde), sin franja va al final
  const grupos={};
  for(const p of lista){
    const key=p.horaDesde||'zzz';
    if(!grupos[key]) grupos[key]=[];
    grupos[key].push(p);
  }
  const keys=Object.keys(grupos).sort();
  const ruta=[];
  let cLat=DEPOT.lat, cLng=DEPOT.lng;
  for(const key of keys){
    const {ruta:tramo, lastLat, lastLng}=_nnRuta(grupos[key], cLat, cLng);
    ruta.push(...tramo);
    cLat=lastLat; cLng=lastLng;
  }
  const dv=ruta.length?distKm(cLat,cLng,DEPOT.lat,DEPOT.lng):0;
  const total=ruta.reduce((s,r)=>s+(r.dist||0),0)+dv;
  return {ruta,total,dv};
}

/* ── TABS ── */
function setTab(tab) {
  tabActual = tab;
  document.getElementById('tabBtnPedidos').classList.toggle('active', tab==='pedidos');
  document.getElementById('tabBtnRuta').classList.toggle('active', tab==='ruta');

/* ── GEO / AUTOCOMPLETE ── */
function closeAC() {
  document.getElementById('autocompleteList').classList.remove('open');
  acIdx = -1;
}

function onDireccionInput() {
  clearTimeout(geoTimer);
  currentGeo = null;
  const val = document.getElementById('fDireccion').value.trim();
  const preview = document.getElementById('zonePreview');
  document.getElementById('geoSpinner').style.display = 'none';
  document.getElementById('geoOk').style.display = 'none';
  preview.textContent = ''; preview.className = 'zone-preview';
  closeAC();
  if(val.length < 5) return;
  geoTimer = setTimeout(() => geocode(val), 600);
}

function onDireccionKey(e) {
  const items = document.getElementById('autocompleteList').querySelectorAll('.autocomplete-item');
  if(!items.length) return;
  if(e.key==='ArrowDown'){ e.preventDefault(); acIdx=Math.min(acIdx+1,items.length-1); }
  else if(e.key==='ArrowUp'){ e.preventDefault(); acIdx=Math.max(acIdx-1,0); }
  else if(e.key==='Enter'&&acIdx>=0){ e.preventDefault(); e.stopPropagation(); items[acIdx].click(); return; }
  else if(e.key==='Escape'){ closeAC(); return; }
  items.forEach((el,i)=>el.classList.toggle('ac-active',i===acIdx));
}

async function geocode(query) {
  const spinner=document.getElementById('geoSpinner');
  const preview=document.getElementById('zonePreview');
  const list=document.getElementById('autocompleteList');
  spinner.style.display='block';
  try {
    const url=`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+', Buenos Aires, Argentina')}&format=json&addressdetails=1&limit=6&countrycodes=ar&viewbox=-59.2,-34.2,-58.0,-35.0&bounded=1`;
    const res=await fetch(url,{headers:{'Accept-Language':'es'}});
    const results=await res.json();
    spinner.style.display='none';
    if(!results.length){ preview.textContent='No se encontró la dirección'; preview.className='zone-preview warn'; return; }
    list.innerHTML='';
    const esCABA = d => { const la=parseFloat(d.lat),lo=parseFloat(d.lon); return la>-34.72&&la<-34.52&&lo>-58.54&&lo<-58.33; };
    const tieneNum = d => !!((d.address||{}).house_number);
    results.sort((a,b) => {
      const c = esCABA(b) - esCABA(a);
      if(c!==0) return c;
      return tieneNum(b) - tieneNum(a);
    });
    results.forEach(data=>{
      const addr=data.address||{};
      const loc=extractLocalidad(addr);
      const zone=assignZone(loc)||assignZone(data.display_name);
      const numFromQ=(query.match(/\b(\d{3,5})\b/)||[])[1]||'';
      const houseNum=addr.house_number||numFromQ||(addr.name&&/\d/.test(addr.name)?addr.name.match(/\d+/)?.[0]:'');
      const street=[addr.road,houseNum].filter(Boolean).join(' ')||data.display_name.split(',')[0];
      const sub=[...new Set([loc,addr.city||addr.town,addr.state].filter(Boolean))].join(', ');
      const item=document.createElement('div');
      item.className='autocomplete-item';
      item.innerHTML=`<div>📍</div><div style="flex:1;min-width:0"><div class="ac-main">${street}</div><div class="ac-sub">${sub}</div></div>${zone?`<div class="ac-zone">${zone.name}</div>`:`<div class="ac-zone unknown">Sin zona</div>`}`;
      item.addEventListener('click',()=>selectGeo(data,loc,zone,query));
      list.appendChild(item);
    });
    list.classList.add('open');
  } catch { spinner.style.display='none'; preview.textContent='Error de conexión'; preview.className='zone-preview error'; }
}

function selectGeo(data,loc,zone,userQuery='') {
  const addr=data.address||{};
  const numFromQuery=(userQuery.match(/\b(\d{3,5})\b/)||[])[1]||'';
  const houseNum=addr.house_number||numFromQuery||(addr.name&&/\d/.test(addr.name)?addr.name.match(/\d+/)?.[0]:'');
  const street=[addr.road,houseNum].filter(Boolean).join(' ')||data.display_name.split(',')[0];
  const city=addr.city||addr.town||loc;
  const display=[...new Set([street,loc,city].filter(Boolean))].join(', ');
  document.getElementById('fDireccion').value=display;
  closeAC();
  const lat=parseFloat(data.lat), lng=parseFloat(data.lon);
  const dist=distKm(DEPOT.lat,DEPOT.lng,lat,lng).toFixed(1);
  const preview=document.getElementById('zonePreview');
  if(zone){
    currentGeo={zona:zone.name,localidad:loc,lat,lng};
    preview.textContent=`${loc} → Zona ${zone.name} · ${dist} km del depósito`;
    preview.className='zone-preview';
  } else {
    currentGeo={zona:'Sin zona',localidad:loc,lat,lng};
    preview.textContent=`${loc||'Encontrado'} → Sin zona · ${dist} km`;
    preview.className='zone-preview warn';
  }
  document.getElementById('geoOk').style.display='block';
}

/* ── AGREGAR PEDIDO ── */
function agregarPedido() {
  const nroOrden=document.getElementById('fOrden').value.trim();
  const nombre=document.getElementById('fNombre').value.trim();
  const telefono=document.getElementById('fTelefono').value.trim();
  const direccion=document.getElementById('fDireccion').value.trim();
  const bultos=parseInt(document.getElementById('fBultos').value)||1;
  const notas=document.getElementById('fNotas').value.trim();
  const horaDesde=document.getElementById('fHoraDesde').value;
  const horaHasta=document.getElementById('fHoraHasta').value;
  const fechaEntrega=document.getElementById('fFechaEntrega').value||'';
  if(!nombre){ document.getElementById('fNombre').focus(); return; }
  if(!direccion){ document.getElementById('fDireccion').focus(); return; }
  if(!currentGeo){
    const p=document.getElementById('zonePreview');
    p.textContent='Esperá que se detecte la zona'; p.className='zone-preview warn'; return;
  }
  pedidos.push({id:nextId++,nroOrden,nombre,telefono,direccion,localidad:currentGeo.localidad,bultos,notas,horaDesde,horaHasta,fechaEntrega,zona:currentGeo.zona,lat:currentGeo.lat,lng:currentGeo.lng});
  save();
  ['fOrden','fNombre','fTelefono','fDireccion','fNotas','fHoraDesde','fHoraHasta','fFechaEntrega'].forEach(id=>document.getElementById(id).value='');
  document.getElementById('fBultos').value='1';
  document.getElementById('zonePreview').textContent='';
  document.getElementById('geoOk').style.display='none';
  currentGeo=null;
  document.getElementById('fNombre').focus();
  // Mostrar confirmación breve
  const conf=document.getElementById('confirmAgregado');
  conf.textContent=`✓ ${nombre} agregado — ${pedidos.length} pedido${pedidos.length!==1?'s':''} en total`;
  conf.style.display='block';
  clearTimeout(window._confTimer);
  window._confTimer=setTimeout(()=>conf.style.display='none',2500);
  renderPedidos();
  updateBadges();
}

function eliminarPedido(id) {
  pedidos=pedidos.filter(p=>p.id!==id);
  entregados=entregados.filter(x=>x!==id);
  save(); saveEntregados();
  renderPedidos(); updateBadges();
}

function limpiarTodo() {
  if(!confirm('¿Borrar todos los pedidos del día?')) return;
  pedidos=[]; entregados=[];
  save(); saveEntregados();
  renderPedidos(); renderRuta(); updateBadges();
}

function toggleEntregado(id) {
  if(entregados.includes(id)) entregados=entregados.filter(x=>x!==id);
  else entregados.push(id);
  saveEntregados();
  renderPedidos();
  renderRuta();
  renderEntregados();
  renderProgramada();
  updateBadges();
}

/* ── RENDER PEDIDOS ── */
function renderPedidos() {
  const container=document.getElementById('zonasPedidos');
  const chips=document.getElementById('chipsPedidos');
  const btnL=document.getElementById('btnLimpiar');

  const pendientes=pedidos.filter(p=>!entregados.includes(p.id));

  if(!pendientes.length){
    container.innerHTML=pedidos.length?'<div class="empty-all">Todos los pedidos fueron entregados.</div>':'<div class="empty-all">Todavía no hay pedidos. Agregá el primero arriba.</div>';
    chips.style.display='none'; btnL.style.display='none'; return;
  }

  // Agrupar y ordenar
  const grouped={};
  for(const z of ZONES) grouped[z.name]=[];
  grouped['Sin zona']=[];
  for(const p of pendientes){
    const key=ZONES.find(z=>z.name===p.zona)?p.zona:'Sin zona';
    grouped[key].push(p);
  }
  for(const k of Object.keys(grouped)){
    grouped[k].sort((a,b)=>{
      const dA=(a.lat&&a.lng)?distKm(DEPOT.lat,DEPOT.lng,a.lat,a.lng):999;
      const dB=(b.lat&&b.lng)?distKm(DEPOT.lat,DEPOT.lng,b.lat,b.lng):999;
      return dA-dB;
    });
  }

  // Chips
  const totalBultos=pendientes.reduce((s,p)=>s+p.bultos,0);
  chips.innerHTML=`<div class="chip"><strong>${pendientes.length}</strong> pedido${pendientes.length!==1?'s':''}</div><div class="chip"><strong>${totalBultos}</strong> bulto${totalBultos!==1?'s':''}</div>`
    +ZONES.map(z=>grouped[z.name].length?`<div class="chip">${z.name}: <strong>${grouped[z.name].length}</strong></div>`:'').join('')
    +(grouped['Sin zona'].length?`<div class="chip" style="border-color:#FECACA;color:#991B1B">Sin zona: <strong>${grouped['Sin zona'].length}</strong></div>`:'');
  chips.style.display='flex';
  btnL.style.display='inline-flex';

  // Zonas
  const allZones=[...ZONES,...(grouped['Sin zona'].length?[{name:'Sin zona',order:99}]:[])];
  container.innerHTML='';
  for(const zone of allZones){
    const lista=grouped[zone.name]||[];
    const rows=lista.map((p,i)=>`
      <tr>
        <td class="td-num order-num-cell">${i+1}</td>
        <td class="td-pedido">
          ${p.nroOrden?`<div class="td-orden">${p.nroOrden}</div>`:''}
          ${p.fechaEntrega?`<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--info);margin-bottom:2px">📅 ${new Date(p.fechaEntrega+'T12:00:00').toLocaleDateString('es-AR',{day:'numeric',month:'short'})}</div>`:''}
          <div class="order-name">${p.nombre}</div>
          <div class="order-addr">${[p.direccion,p.localidad].filter(Boolean).join(' — ')}</div>
        </td>
        <td class="td-tel" style="font-size:13px;color:var(--ink2)">${p.telefono||'—'}</td>
        <td class="td-horario" style="font-size:12px;font-family:'DM Mono',monospace;color:var(--accent)">${fmtRango(p.horaDesde,p.horaHasta)||'—'}</td>
        <td class="td-notas" style="font-size:13px;color:var(--warn)">${p.notas||'—'}</td>
        <td class="td-bultos"><span class="qty-badge">${p.bultos}</span></td>
        <td class="td-dist" style="font-size:11px;color:var(--ink3);font-family:'DM Mono',monospace">${p.lat?distKm(DEPOT.lat,DEPOT.lng,p.lat,p.lng).toFixed(1)+' km':'—'}</td>
        <td class="td-del"><button class="del-btn" onclick="eliminarPedido(${p.id})">×</button></td>
      </tr>`).join('');
    const card=document.createElement('div');
    card.className='zone-card';
    card.innerHTML=`
      <div class="zone-header">
        <div class="zone-num ${zone.order===99?'unknown':''}">${zone.order===99?'?':zone.order}</div>
        <div class="zone-name">${zone.name}</div>
        <div class="zone-count">${lista.length} pedido${lista.length!==1?'s':''}</div>
      </div>
      ${lista.length?`<table class="order-table"><thead><tr><th>#</th><th>Pedido</th><th>Teléfono</th><th>Horario</th><th>Observaciones</th><th>Bultos</th><th>Dist.</th><th></th></tr></thead><tbody>${rows}</tbody></table>`
      :'<div class="empty-zone">Sin pedidos para esta zona</div>'}`;
    container.appendChild(card);
  }
}

/* ── RENDER RUTA ── */
function renderRuta() {
  const el=document.getElementById('rutaInner');
  el.setAttribute('data-fecha', new Date().toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long',year:'numeric'}));
  if(!pedidos.length){
    el.innerHTML='<div class="empty-all">No hay pedidos cargados.<br>Cargalos en la solapa Pedidos.</div>'; return;
  }

  const hoyStr=new Date().toISOString().slice(0,10);
  const pendientes=pedidos.filter(p=>!entregados.includes(p.id)&&(!p.fechaEntrega||p.fechaEntrega<=hoyStr));
  const {ruta,total,dv}=optimizarRuta(pendientes);
  const totalBultos=pendientes.reduce((s,p)=>s+p.bultos,0);
  const nDone=entregados.length;
  const nTotal=pedidos.length;
  const pct=nTotal?Math.round(nDone/nTotal*100):0;

  if(!pendientes.length&&pedidos.length){
    const todoProgramado=pedidos.filter(p=>!entregados.includes(p.id)).every(p=>p.fechaEntrega&&p.fechaEntrega>hoyStr);
    if(todoProgramado){
      el.innerHTML='<div class="empty-all">No hay pedidos para hoy. Revisá la Hoja de Ruta Programada.</div>'; return;
    }
  }

  if(!pendientes.length){
    el.innerHTML=`
      <div class="ruta-progress">
        <div class="prog-bar-wrap">
          <div class="prog-label">${nDone} de ${nTotal} entregados — ¡Ruta completada!</div>
          <div class="prog-bar"><div class="prog-fill" style="width:100%"></div></div>
        </div>
        <div class="prog-pct">100%</div>
      </div>
      <div class="empty-all" style="padding:32px 20px">🎉 Todos los pedidos fueron entregados.<br>Revisalos en la solapa Entregados.</div>`;
    return;
  }

  const stops=ruta.map((r,idx)=>{
    const p=r.pedido;
    const dist=r.dist!==null?r.dist.toFixed(1)+' km':'—';
    return `
      <div class="connector"></div>
      <div class="stop-card">
        <div class="stop-top">
          <div class="stop-num">${idx+1}</div>
          <div class="stop-info">
            ${p.nroOrden?`<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--info);margin-bottom:2px">${p.nroOrden}</div>`:''}
            <div class="stop-name">${p.nombre}</div>
            <div class="stop-addr">${[p.direccion,p.localidad].filter(Boolean).join(' — ')}</div>
            ${fmtRango(p.horaDesde,p.horaHasta)?`<div style="margin-top:3px;font-size:12px;font-family:'DM Mono',monospace;color:var(--accent)">⏱ ${fmtRango(p.horaDesde,p.horaHasta)}</div>`:''}
            ${p.notas?`<div class="stop-notes">${p.notas}</div>`:''}
            <div class="print-tel" style="display:none;margin-top:4px;font-size:12px;color:#444">📞 ${p.telefono||'Sin teléfono'}</div>
            ${fmtRango(p.horaDesde,p.horaHasta)?`<div class="print-horario" style="display:none;font-size:12px;color:#444">⏱ ${fmtRango(p.horaDesde,p.horaHasta)}</div>`:''}
          </div>
          <div class="stop-right">
            <span class="qty-badge">${p.bultos} bulto${p.bultos!==1?'s':''}</span>
            <span class="stop-dist">${dist}</span>
          </div>
        </div>
        <div class="stop-actions">
          ${p.telefono?`<button class="btn-wsp" style="background:#128C7E" onclick="wspUbicacion('${p.telefono}','${p.nombre.replace(/'/g,"\\'")}')">📍 Enviar ubicación</button>`:''}
          <button class="btn-done" onclick="toggleEntregado(${p.id})">Marcar entregado</button>
          <button class="btn btn-ghost btn-sm" onclick="abrirEditarPedido(${p.id})">✏ Editar</button>
          <button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger)" onclick="eliminarPedido(${p.id})">× Eliminar</button>
        </div>
      </div>`;
  }).join('');

  const gmapsUrl = (() => {
    const stops = ruta.filter(r => r.pedido.lat && r.pedido.lng);
    if (!stops.length) return null;
    const origin = `${DEPOT.lat},${DEPOT.lng}`;
    const dest   = `${DEPOT.lat},${DEPOT.lng}`;
    const wps    = stops.map(r => `${r.pedido.lat},${r.pedido.lng}`).join('|');
    return `https://www.google.com/maps/dir/?api=1&origin=${origin}&destination=${dest}&waypoints=${wps}&travelmode=driving`;
  })();

  el.innerHTML=`
    <div style="display:flex;gap:8px;margin-bottom:16px">
      ${gmapsUrl ? `<a href="${gmapsUrl}" target="_blank" rel="noopener" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:#1D4ED8;color:#fff;padding:12px 16px;border-radius:var(--radius);text-decoration:none;font-weight:600;font-size:14px">🗺 Google Maps</a>` : ''}
      <button onclick="window.print()" style="flex:1;display:flex;align-items:center;justify-content:center;gap:8px;background:var(--surface);border:1px solid var(--border);color:var(--ink);padding:12px 16px;border-radius:var(--radius);font:600 14px 'DM Sans',sans-serif;cursor:pointer">🖨 Imprimir ruta</button>
    </div>
    <div class="ruta-progress">
      <div class="prog-bar-wrap">
        <div class="prog-label">${nDone} de ${ruta.length} entregados · ${totalBultos} bultos · ${total.toFixed(1)} km totales</div>
        <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="prog-pct">${pct}%</div>
    </div>
    <div class="depot-row">
      <div class="depot-dot">🏭</div>
      <div class="depot-label"><strong>Depósito</strong><span>Av. Caseros 2431 · Punto de partida</span></div>
    </div>
    ${stops}
    <div class="connector"></div>
    <div class="depot-row">
      <div class="depot-dot">🏭</div>
      <div class="depot-label"><strong>Regreso al depósito</strong><span>${dv.toFixed(1)} km de vuelta</span></div>
    </div>`;
}

function limpiarEntregados() {
  if(!confirm('¿Eliminar todos los pedidos entregados?')) return;
  pedidos=pedidos.filter(p=>!entregados.includes(p.id));
  entregados=[];
  save(); saveEntregados();
  renderPedidos(); renderRuta(); renderEntregados(); renderProgramada();
  updateBadges();
}

/* ── RENDER ENTREGADOS ── */
function renderEntregados() {
  const el=document.getElementById('entregadosInner');
  const lista=pedidos.filter(p=>entregados.includes(p.id));
  if(!lista.length){
    el.innerHTML='<div class="empty-all">Ningún pedido entregado aún.</div>'; return;
  }
  const totalBultos=lista.reduce((s,p)=>s+p.bultos,0);
  el.innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:16px">
      <div class="chips" style="margin:0;flex:1">
        <div class="chip"><strong>${lista.length}</strong> entregado${lista.length!==1?'s':''}</div>
        <div class="chip"><strong>${totalBultos}</strong> bulto${totalBultos!==1?'s':''}</div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="limpiarEntregados()">Limpiar entregados</button>
    </div>
    ${lista.map(p=>`
      <div class="stop-card" style="margin-bottom:8px;border-color:var(--accent-light)">
        <div class="stop-top">
          <div class="stop-num done-num">✓</div>
          <div class="stop-info">
            ${p.nroOrden?`<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--info);margin-bottom:2px">${p.nroOrden}</div>`:''}
            <div class="stop-name">${p.nombre}</div>
            <div class="stop-addr">${[p.direccion,p.localidad].filter(Boolean).join(' — ')}</div>
            ${fmtRango(p.horaDesde,p.horaHasta)?`<div style="margin-top:3px;font-size:12px;font-family:'DM Mono',monospace;color:var(--accent)">⏱ ${fmtRango(p.horaDesde,p.horaHasta)}</div>`:''}
            ${p.notas?`<div class="stop-notes">${p.notas}</div>`:''}
          </div>
          <div class="stop-right">
            <span class="qty-badge">${p.bultos} bulto${p.bultos!==1?'s':''}</span>
          </div>
        </div>
        <div class="stop-actions">
          <button class="btn-done done" onclick="toggleEntregado(${p.id})">✓ Entregado</button>
        </div>
      </div>
    `).join('')}`;
}

/* ── RENDER PROGRAMADA ── */
function renderProgramada() {
  const el=document.getElementById('programadaInner');
  const hoyStr=new Date().toISOString().slice(0,10);
  const lista=pedidos.filter(p=>!entregados.includes(p.id)&&p.fechaEntrega&&p.fechaEntrega>hoyStr);

  if(!lista.length){
    el.innerHTML='<div class="empty-all">No hay pedidos programados.</div>'; return;
  }

  // Agrupar por fecha
  const porFecha={};
  for(const p of lista){
    if(!porFecha[p.fechaEntrega]) porFecha[p.fechaEntrega]=[];
    porFecha[p.fechaEntrega].push(p);
  }
  const fechas=Object.keys(porFecha).sort();

  el.innerHTML=fechas.map(fecha=>{
    const grupo=porFecha[fecha];
    const {ruta}=optimizarRuta(grupo);
    const totalBultos=grupo.reduce((s,p)=>s+p.bultos,0);
    const fechaLabel=new Date(fecha+'T12:00:00').toLocaleDateString('es-AR',{weekday:'long',day:'numeric',month:'long'});

    const stops=ruta.map((r,idx)=>{
      const p=r.pedido;
      const dist=r.dist!==null?r.dist.toFixed(1)+' km':'—';
      return `
        <div class="connector"></div>
        <div class="stop-card">
          <div class="stop-top">
            <div class="stop-num">${idx+1}</div>
            <div class="stop-info">
              ${p.nroOrden?`<div style="font-size:11px;font-family:'DM Mono',monospace;color:var(--info);margin-bottom:2px">${p.nroOrden}</div>`:''}
              <div class="stop-name">${p.nombre}</div>
              <div class="stop-addr">${[p.direccion,p.localidad].filter(Boolean).join(' — ')}</div>
              ${fmtRango(p.horaDesde,p.horaHasta)?`<div style="margin-top:3px;font-size:12px;font-family:'DM Mono',monospace;color:var(--accent)">⏱ ${fmtRango(p.horaDesde,p.horaHasta)}</div>`:''}
              ${p.notas?`<div class="stop-notes">${p.notas}</div>`:''}
            </div>
            <div class="stop-right">
              <span class="qty-badge">${p.bultos} bulto${p.bultos!==1?'s':''}</span>
              <span class="stop-dist">${dist}</span>
            </div>
          </div>
          <div class="stop-actions">
            ${p.telefono?`<button class="btn-wsp" style="background:#128C7E" onclick="wspUbicacion('${p.telefono}','${p.nombre.replace(/'/g,"\\'")}')">📍 Enviar ubicación</button>`:''}
            <button class="btn-done" onclick="toggleEntregado(${p.id})">Marcar entregado</button>
            <button class="btn btn-ghost btn-sm" onclick="abrirEditarPedido(${p.id})">✏ Editar</button>
            <button class="btn btn-sm" style="background:var(--danger-light);color:var(--danger)" onclick="eliminarPedido(${p.id})">× Eliminar</button>
          </div>
        </div>`;
    }).join('');

    return `
      <div style="margin-bottom:28px">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--accent)">
          <div style="font-size:15px;font-weight:700;color:var(--accent);text-transform:capitalize">${fechaLabel}</div>
          <div style="font-size:13px;color:var(--ink2)">${grupo.length} pedido${grupo.length!==1?'s':''} · ${totalBultos} bulto${totalBultos!==1?'s':''}</div>
        </div>
        <div class="depot-row">
          <div class="depot-dot">🏭</div>
          <div class="depot-label"><strong>Depósito</strong><span>Av. Caseros 2431 · Punto de partida</span></div>
        </div>
        ${stops}
        <div class="connector"></div>
        <div class="depot-row">
          <div class="depot-dot">🏭</div>
          <div class="depot-label"><strong>Regreso al depósito</strong></div>
        </div>
      </div>`;
  }).join('');
}

/* ── BADGES ── */
function updateBadges() {
  const n=pedidos.length;
  const nd=entregados.length;
  document.getElementById('badgePedidos').textContent=n;
  document.getElementById('badgePedidos').className='tab-badge'+(n?'':' empty');
  document.getElementById('badgeRuta').textContent=nd?`${nd}/${n}`:n;
  document.getElementById('badgeRuta').className='tab-badge'+(n?'':' empty');
  document.getElementById('badgeEntregados').textContent=nd;
  document.getElementById('badgeEntregados').className='tab-badge'+(nd?'':' empty');
  const hoyStr=new Date().toISOString().slice(0,10);
  const np=pedidos.filter(p=>!entregados.includes(p.id)&&p.fechaEntrega&&p.fechaEntrega>hoyStr).length;
  document.getElementById('badgeProgramada').textContent=np;
  document.getElementById('badgeProgramada').className='tab-badge'+(np?'':' empty');
}

/* ── EDITAR PEDIDO ── */
let _editId = null;
function abrirEditarPedido(id) {
  const p = pedidos.find(x => x.id === id);
  if (!p) return;
  _editId = id;
  document.getElementById('editOrden').value     = p.nroOrden  || '';
  document.getElementById('editNombre').value    = p.nombre    || '';
  document.getElementById('editTelefono').value  = p.telefono  || '';
  document.getElementById('editDireccion').value = p.direccion || '';
  document.getElementById('editHoraDesde').value    = p.horaDesde    || '';
  document.getElementById('editHoraHasta').value    = p.horaHasta    || '';
  document.getElementById('editNotas').value         = p.notas        || '';
  document.getElementById('editFechaEntrega').value  = p.fechaEntrega || '';
  document.getElementById('editBultos').value        = p.bultos       || 1;
  document.getElementById('editModal').classList.add('open');
}
function cerrarEditModal() {
  document.getElementById('editModal').classList.remove('open');
  _editId = null;
}
function guardarEdicion() {
  const p = pedidos.find(x => x.id === _editId);
  if (!p) return;
  p.nroOrden  = document.getElementById('editOrden').value.trim();
  p.nombre    = document.getElementById('editNombre').value.trim()    || p.nombre;
  p.telefono  = document.getElementById('editTelefono').value.trim();
  p.direccion = document.getElementById('editDireccion').value.trim() || p.direccion;
  p.horaDesde    = document.getElementById('editHoraDesde').value;
  p.horaHasta    = document.getElementById('editHoraHasta').value;
  p.notas        = document.getElementById('editNotas').value.trim();
  p.fechaEntrega = document.getElementById('editFechaEntrega').value;
  p.bultos       = parseInt(document.getElementById('editBultos').value) || 1;
  save();
  cerrarEditModal();
  renderRuta();
  updateBadges();
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarEditModal(); });

function _syncChip(state) {
  const el = document.getElementById('syncChip');
  if (!el) return;
  const map = { syncing: ['⟳ Guardando…', .3], ok: ['✓ Guardado', .7], error: ['⚠ Error', .7] };
  const [text, opacity] = map[state] || map.ok;
  el.textContent = text; el.style.opacity = opacity; el.style.display = '';
  if (state === 'ok') setTimeout(() => { el.style.display = 'none'; }, 2000);
}

async function _fbLoad() {
  _syncChip('syncing');
  try {
    const doc = await _db.collection('despacho').doc('estado').get();
    if (doc.exists) {
      const data = doc.data();
      pedidos = data.pedidos || [];
      nextId  = data.nextId  || 1;
    }
    _syncChip('ok');
  } catch(e) {
    _syncChip('error');
    console.warn('Firebase load error:', e);
  }
}
